<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>📸 Моя Галерея</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #17171a; --surface2: #1e1e22;
    --border: #2a2a30; --accent: #c8a96e; --accent2: #e8c98e;
    --text: #f0ede8; --text2: #888880; --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overscroll-behavior:none; }

  /* ── Login ── */
  .login-screen {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:20px;
  }
  .login-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:40px 32px; width:100%; max-width:360px;
  }
  .login-title {
    font-family:'Playfair Display',serif; font-size:24px;
    color:var(--accent); text-align:center; margin-bottom:8px;
  }
  .login-sub { font-size:13px; color:var(--text2); text-align:center; margin-bottom:28px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; color:var(--text2); margin-bottom:6px; }
  .field input {
    width:100%; padding:12px 14px; background:var(--surface2);
    border:1px solid var(--border); border-radius:var(--radius);
    color:var(--text); font-size:15px; font-family:inherit; outline:none;
    transition:border-color .2s;
  }
  .field input:focus { border-color:var(--accent); }
  .btn-login {
    width:100%; padding:13px; background:var(--accent); color:#1a1408;
    border:none; border-radius:var(--radius); font-size:15px;
    font-weight:600; font-family:inherit; cursor:pointer; transition:opacity .2s;
    margin-top:4px;
  }
  .btn-login:hover { opacity:.9; }
  .login-error {
    background:#2a1515; border:1px solid #5a2020; color:#f08080;
    border-radius:var(--radius); padding:10px 14px; font-size:13px;
    margin-top:14px; display:none;
  }

  /* ── Header ── */
  .header {
    position:sticky; top:0; z-index:100;
    background:rgba(13,13,15,0.92); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:14px 16px; display:flex; align-items:center; gap:12px;
  }
  .header-back {
    width:36px; height:36px; display:flex; align-items:center; justify-content:center;
    background:var(--surface2); border-radius:50%; cursor:pointer; border:none;
    color:var(--text); font-size:18px; transition:background .2s; flex-shrink:0;
  }
  .header-back:hover { background:var(--border); }
  .header-title {
    font-family:'Playfair Display',serif; font-size:18px; font-weight:500;
    color:var(--accent); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .header-count {
    font-size:12px; color:var(--text2); background:var(--surface2);
    padding:4px 10px; border-radius:20px; flex-shrink:0;
  }
  .btn-logout {
    background:transparent; border:1px solid var(--border); color:var(--text2);
    padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer;
    transition:all .2s; flex-shrink:0;
  }
  .btn-logout:hover { border-color:var(--accent); color:var(--accent); }

  /* ── Breadcrumb ── */
  .breadcrumb {
    padding:10px 16px; font-size:12px; color:var(--text2);
    overflow-x:auto; white-space:nowrap; scrollbar-width:none;
  }
  .breadcrumb::-webkit-scrollbar { display:none; }
  .breadcrumb a { color:var(--accent); text-decoration:none; }
  .breadcrumb span { margin:0 5px; }

  /* ── Folder grid ── */
  .folders {
    padding:12px 16px 6px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;
  }
  .folder-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 14px; cursor:pointer; transition:all .2s;
    text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:8px;
  }
  .folder-card:hover { background:var(--surface2); border-color:var(--accent); }
  .folder-card:active { transform:scale(0.96); }
  .folder-icon { font-size:28px; }
  .folder-name { font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .folder-meta { font-size:11px; color:var(--text2); }

  /* ── Photo grid ── */
  .section-label { padding:10px 16px 6px; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
  .photos { padding:0 16px 80px; display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
  .photo-item { aspect-ratio:1; overflow:hidden; cursor:pointer; border-radius:4px; background:var(--surface); }
  .photo-item img { width:100%; height:100%; object-fit:cover; transition:transform .3s; display:block; }
  .photo-item:active img { transform:scale(0.95); }

  /* ── Lightbox ── */
  .lightbox {
    display:none; position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,0.97); flex-direction:column;
    align-items:center; justify-content:center; touch-action:none;
  }
  .lightbox.open { display:flex; }
  .lightbox-close {
    position:absolute; top:16px; right:16px; width:40px; height:40px;
    background:rgba(255,255,255,0.1); border:none; color:white; font-size:22px;
    border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10;
  }
  .lightbox-img { max-width:100vw; max-height:85vh; object-fit:contain; border-radius:4px; user-select:none; }
  .lightbox-nav {
    position:absolute; top:50%; transform:translateY(-50%);
    display:flex; justify-content:space-between; width:100%; padding:0 10px; pointer-events:none;
  }
  .lightbox-btn {
    width:44px; height:44px; background:rgba(255,255,255,0.12); border:none; color:white;
    font-size:20px; border-radius:50%; cursor:pointer; pointer-events:all;
    display:flex; align-items:center; justify-content:center; transition:background .2s;
  }
  .lightbox-btn:hover { background:rgba(255,255,255,0.25); }
  .lightbox-info {
    position:absolute; bottom:24px; font-size:13px; color:rgba(255,255,255,0.5);
    text-align:center; padding:0 20px; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; max-width:90vw;
  }

  /* ── Empty ── */
  .empty { padding:60px 20px; text-align:center; color:var(--text2); }
  .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty p { font-size:14px; }

  /* ── Root folders screen ── */
  .root-folders { padding:16px; }
  .root-title {
    font-family:'Playfair Display',serif; font-size:20px;
    color:var(--accent); margin-bottom:16px; padding:0 4px;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-title">📸 Галерея</div>
    <div class="login-sub">Введіть логін і пароль для доступу</div>
    <div class="field">
      <label>Логін</label>
      <input type="text" id="loginUsername" placeholder="username" autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">Увійти</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- GALLERY SCREEN -->
<div id="galleryScreen" style="display:none">
  <div class="header">
    <button class="header-back" id="backBtn" onclick="goBack()" style="display:none">‹</button>
    <div class="header-title" id="pageTitle">📸 Галерея</div>
    <div class="header-count" id="pageCount"></div>
    <button class="btn-logout" onclick="doLogout()">Вийти</button>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="app"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <div class="lightbox-nav">
    <button class="lightbox-btn" onclick="lightboxPrev()">‹</button>
    <button class="lightbox-btn" onclick="lightboxNext()">›</button>
  </div>
  <div class="lightbox-info" id="lightboxInfo"></div>
</div>

<script>
let token = localStorage.getItem('gallery_token') || null;
let currentPhotos = [];
let lightboxIndex = 0;
let touchStartX = 0;
let navHistory = [];
// state: { screen: 'root' | 'folder', folderId, folderName, subPath }
let currentState = null;

// ── AUTH ──────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!username || !password) {
    showLoginError('Введіть логін і пароль');
    return;
  }

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) {
      const d = await res.json();
      showLoginError(d.detail || 'Невірний логін або пароль');
      return;
    }
    const data = await res.json();
    token = data.access_token;
    localStorage.setItem('gallery_token', token);
    showGallery();
  } catch {
    showLoginError('Помилка з\'єднання з сервером');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogout() {
  token = null;
  localStorage.removeItem('gallery_token');
  document.getElementById('galleryScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
}

function showGallery() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('galleryScreen').style.display = 'block';
  navHistory = [];
  loadRootFolders();
}

// ── API ───────────────────────────────────────────
async function api(url) {
  const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
  if (res.status === 401) { doLogout(); return null; }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── ROOT FOLDERS ──────────────────────────────────
async function loadRootFolders() {
  const folders = await api('/api/folders');
  if (!folders) return;

  currentState = { screen: 'root' };
  document.getElementById('pageTitle').textContent = '📸 Галерея';
  document.getElementById('pageCount').textContent = folders.length + ' папок';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('breadcrumb').innerHTML = '';

  const app = document.getElementById('app');

  if (folders.length === 0) {
    app.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><p>Немає доступних папок</p></div>';
    return;
  }

  let html = '<div class="folders">';
  folders.forEach(f => {
    html += `<a class="folder-card" href="#" onclick="openFolder(${f.id},'${escHtml(f.name)}','');return false;">
      <div class="folder-icon">📁</div>
      <div class="folder-name">${escHtml(f.name)}</div>
      <div class="folder-meta">Відкрити</div>
    </a>`;
  });
  html += '</div>';
  app.innerHTML = html;
}

// ── OPEN FOLDER ───────────────────────────────────
async function openFolder(folderId, folderName, subPath) {
  const data = await api(`/api/list?folder_id=${folderId}&sub_path=${encodeURIComponent(subPath)}`);
  if (!data) return;

  navHistory.push(currentState);
  currentState = { screen: 'folder', folderId, folderName, subPath };

  const displayName = subPath ? subPath.split('/').pop() : folderName;
  document.getElementById('pageTitle').textContent = displayName;
  const total = data.folders.length + data.photos.length;
  document.getElementById('pageCount').textContent = total > 0 ? total + ' шт' : '';
  document.getElementById('backBtn').style.display = 'flex';

  buildBreadcrumb(folderId, folderName, subPath);
  renderDirListing(data, folderId, folderName);
  window.scrollTo(0, 0);
}

function renderDirListing(data, folderId, folderName) {
  const app = document.getElementById('app');
  currentPhotos = data.photos;

  let html = '';

  if (data.folders.length > 0) {
    html += '<div class="folders">';
    data.folders.forEach(f => {
      html += `<a class="folder-card" href="#" onclick="openFolder(${f.folder_id},'${escHtml(folderName)}','${escHtml(f.sub_path)}');return false;">
        <div class="folder-icon">📁</div>
        <div class="folder-name">${escHtml(f.name)}</div>
        <div class="folder-meta">${f.count} фото</div>
      </a>`;
    });
    html += '</div>';
  }

  if (data.photos.length > 0) {
    if (data.folders.length > 0) html += '<div class="section-label">Фотографії</div>';
    html += '<div class="photos">';
    data.photos.forEach((p, i) => {
      const thumb = '/thumb?path=' + encodeURIComponent(p.path);
      const orig  = '/photo?path=' + encodeURIComponent(p.path);
      html += `<div class="photo-item" onclick="openLightbox(${i})">
        <img src="${thumb}" loading="lazy" alt="${escHtml(p.name)}"
             onerror="this.src='${orig}'" onload="this.classList.add('loaded')">
      </div>`;
    });
    html += '</div>';
  }

  if (data.folders.length === 0 && data.photos.length === 0) {
    html = '<div class="empty"><div class="empty-icon">📂</div><p>Папка порожня</p></div>';
  }

  app.innerHTML = html;
}

function buildBreadcrumb(folderId, folderName, subPath) {
  const bc = document.getElementById('breadcrumb');
  let html = `<a href="#" onclick="loadRootFolders();return false;">🏠 Головна</a>`;
  html += `<span>›</span><a href="#" onclick="openFolder(${folderId},'${escHtml(folderName)}','');return false;">${escHtml(folderName)}</a>`;

  if (subPath) {
    const parts = subPath.split('/').filter(Boolean);
    let acc = '';
    parts.forEach((p, i) => {
      acc += (acc ? '/' : '') + p;
      const a = acc;
      if (i < parts.length - 1) {
        html += `<span>›</span><a href="#" onclick="openFolder(${folderId},'${escHtml(folderName)}','${a}');return false;">${escHtml(p)}</a>`;
      } else {
        html += `<span>›</span><span style="color:var(--text)">${escHtml(p)}</span>`;
      }
    });
  }
  bc.innerHTML = html;
}

function goBack() {
  if (navHistory.length === 0) return;
  const prev = navHistory.pop();
  if (!prev || prev.screen === 'root') {
    currentState = { screen: 'root' };
    loadRootFolders();
  } else {
    currentState = prev;
    openFolder(prev.folderId, prev.folderName, prev.subPath);
    navHistory.pop(); // openFolder додає в history, тому видаляємо зайве
  }
}

// ── LIGHTBOX ──────────────────────────────────────
function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox() {
  const p = currentPhotos[lightboxIndex];
  const imgEl = document.getElementById('lightboxImg');
  imgEl.src = '/photo?path=' + encodeURIComponent(p.path) + '&_t=' + token;

  // Додаємо токен через fetch + blob для захищених ендпоінтів
  fetch('/photo?path=' + encodeURIComponent(p.path), {
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(r => r.blob()).then(blob => {
    imgEl.src = URL.createObjectURL(blob);
  });

  document.getElementById('lightboxInfo').textContent = p.name + '  ·  ' + (lightboxIndex+1) + ' / ' + currentPhotos.length;
}

function lightboxNext() { lightboxIndex = (lightboxIndex+1) % currentPhotos.length; updateLightbox(); }
function lightboxPrev() { lightboxIndex = (lightboxIndex-1+currentPhotos.length) % currentPhotos.length; updateLightbox(); }

document.getElementById('lightbox').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) dx < 0 ? lightboxNext() : lightboxPrev();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lightboxNext();
  if (e.key === 'ArrowLeft') lightboxPrev();
  if (e.key === 'Escape') closeLightbox();
});

// ── HELPERS ───────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

// ── INIT ──────────────────────────────────────────
if (token) {
  showGallery();
}
</script>
</body>
</html>
